# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - vestaserver

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      deployInfrastructure:
        description: 'Provision/update Azure infrastructure (Bicep) before deploying'
        type: boolean
        default: false

jobs:
  infrastructure:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.deployInfrastructure }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout
    steps:
      - uses: actions/checkout@v6

      - name: Login to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_4572A8CB87F74681B717C2AFB5476B68 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_022AC360768D495B9C57A308841215E4 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_986C7808523F4FE4BD28833B0D56B3D4 }}

      - name: Deploy Bicep (relay stack)
        shell: bash
        env:
          VESTA_PG_PASSWORD: ${{ secrets.VESTA_PG_PASSWORD }}
          VESTA_RELAY_ADMIN_PUBLICKEY: ${{ secrets.VESTA_RELAY_ADMIN_PUBLICKEY }}
        run: |
          az bicep install
          az deployment sub create \
            --location norwayeast \
            --template-file .github/infra/main.bicep \
            --parameters .github/infra/params/dev.bicepparam

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v6

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Build with dotnet
        run: dotnet build src/VestaServer/VestaServer.csproj --configuration Release

      - name: Run tests
        run: dotnet test Vesta.sln --configuration Release

      - name: dotnet publish
        run: dotnet publish src/VestaServer/VestaServer.csproj -c Release -o ${{env.DOTNET_ROOT}}/myapp

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v6
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: ubuntu-latest
    needs: [build, infrastructure]
    if: ${{ always() && needs.build.result == 'success' && (needs.infrastructure.result == 'success' || needs.infrastructure.result == 'skipped') }}
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v7
        with:
          name: .net-app
      
      - name: Login to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_4572A8CB87F74681B717C2AFB5476B68 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_022AC360768D495B9C57A308841215E4 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_986C7808523F4FE4BD28833B0D56B3D4 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'vestaserver'
          slot-name: 'Production'
          package: .
          