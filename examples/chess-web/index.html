<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Vesta Chess</title>
        <link rel="stylesheet" href="/src/styles.css" />
    </head>
    <body>
        <div id="app">
            <header>
                <h1>♛ Vesta Chess</h1>
                <div class="status">
                    <span id="conn-status" class="badge offline">offline</span>
                    <span id="me" class="me"></span>
                </div>
            </header>

            <main>
                <!-- Lobby view -->
                <section id="lobby-view" class="view">
                    <div class="panel">
                        <h2>Players</h2>
                        <ul id="players-list" class="list"></ul>
                        <p class="hint">
                            Online players can be invited to a match.
                        </p>
                    </div>
                    <div class="panel">
                        <h2>Your matches</h2>
                        <h3>Invitations</h3>
                        <ul id="invites-list" class="list"></ul>
                        <h3>Active</h3>
                        <ul id="active-list" class="list"></ul>
                    </div>
                </section>

                <!-- Match view -->
                <section id="match-view" class="view hidden">
                    <div class="match-header">
                        <button id="leave-match">← Back to lobby</button>
                        <span id="match-title"></span>
                        <span id="match-turn"></span>
                    </div>
                    <div id="board" class="board"></div>
                    <div class="match-actions">
                        <button id="resign-btn">Resign</button>
                        <span id="match-message"></span>
                    </div>
                </section>
            </main>

            <footer>
                <div id="connect-controls">
                    <label>
                        Relays:
                        <input
                            id="server-url"
                            type="text"
                            value="ws://localhost:5050/ws"
                            title="One or more relay URLs, comma-separated. The client fails over in order."
                        />
                    </label>
                    <label>
                        Username:
                        <input id="username" type="text" />
                    </label>
                    <button id="connect-btn">Connect</button>
                </div>
                <button id="logout-btn" class="hidden">Log out</button>

                <!-- Relay independence panel: active relay, failover candidates,
                     and the per-user override (the ownership escape hatch). -->
                <div id="relay-panel" class="relay-panel hidden">
                    <h3>Relay</h3>
                    <p class="relay-active-row">
                        Active: <span id="relay-active" class="relay-active">—</span>
                    </p>
                    <label>
                        Switch to:
                        <select id="relay-select"></select>
                    </label>
                    <button id="relay-switch-btn">Switch</button>
                    <div class="relay-override-row">
                        <label>
                            My relay override:
                            <input
                                id="relay-override"
                                type="text"
                                placeholder="wss://my-relay.example/ws"
                            />
                        </label>
                        <button id="relay-override-btn">Use this relay</button>
                        <button id="relay-override-clear">Clear override</button>
                    </div>
                    <p id="relay-manifest" class="relay-manifest"></p>
                </div>
            </footer>
        </div>

        <script type="module" src="/src/main.ts"></script>
    </body>
</html>
